# Caller workflow template — deploy this to child repos as .github/workflows/pr-clickup-sync.yml
# It determines the PR event type and calls the reusable workflow in Craftsman.

name: PR ClickUp Sync

on:
  pull_request:
    types: [opened, edited, closed]
  pull_request_review:
    types: [submitted]

jobs:
  determine-event:
    runs-on: ubuntu-latest
    outputs:
      pr_event: ${{ steps.event.outputs.pr_event }}
      should_run: ${{ steps.event.outputs.should_run }}
    steps:
      - name: Determine PR event type
        id: event
        uses: actions/github-script@v8
        with:
          script: |
            var event = context.eventName;
            var action = context.payload.action;
            var prEvent = "";
            var shouldRun = "true";

            if (event === "pull_request" && action === "opened") {
              prEvent = "opened";
            } else if (event === "pull_request" && action === "edited") {
              // Only re-process if the PR body was edited (not just the title)
              if (context.payload.changes && context.payload.changes.body) {
                prEvent = "opened";
              } else {
                shouldRun = "false";
              }
            } else if (event === "pull_request_review" && context.payload.review && context.payload.review.state === "approved") {
              prEvent = "approved";
            } else if (event === "pull_request_review" && context.payload.review && context.payload.review.state === "changes_requested") {
              prEvent = "changes_requested";
            } else if (event === "pull_request" && action === "closed" && context.payload.pull_request.merged) {
              prEvent = "merged";
            } else if (event === "pull_request" && action === "closed" && !context.payload.pull_request.merged) {
              prEvent = "closed";
            } else {
              shouldRun = "false";
            }

            core.setOutput("pr_event", prEvent);
            core.setOutput("should_run", shouldRun);

  # Requires org-level secrets:
  #   CLICKUP_API_TOKEN, CLICKUP_TEAM_ID — ClickUp API auth
  #   AUTOMATION_CONFIG_TOKEN — fine-grained PAT with Contents:read on TenonHQ/Craftsman
  #     and Pull-requests:read on every repo in automation-config.json repos[*].
  #     Without it, the cross-repo checkout of Craftsman fails with "Repository not found".
  sync:
    needs: determine-event
    if: needs.determine-event.outputs.should_run == 'true'
    uses: TenonHQ/Craftsman/.github/workflows/pr-clickup-sync.yml@main
    with:
      pr_event: ${{ needs.determine-event.outputs.pr_event }}
      pr_url: ${{ github.event.pull_request.html_url }}
      pr_number: ${{ github.event.pull_request.number }}
      target_branch: ${{ github.event.pull_request.base.ref }}
      pr_title: ${{ github.event.pull_request.title }}
      repo_full_name: ${{ github.repository }}
      head_branch: ${{ github.event.pull_request.head.ref }}
    secrets:
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}
      CONFIG_REPO_TOKEN: ${{ secrets.AUTOMATION_CONFIG_TOKEN }}

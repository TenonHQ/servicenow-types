# Caller workflow template — deploy this to child repos as .github/workflows/branch-clickup-sync.yml
# Triggers on branch creation and calls the reusable workflow in Craftsman.

name: Branch ClickUp Sync

on:
  create:

jobs:
  # Requires org-level secrets:
  #   CLICKUP_API_TOKEN, CLICKUP_TEAM_ID — ClickUp API auth
  #   AUTOMATION_CONFIG_TOKEN — fine-grained PAT with Contents:read on TenonHQ/Craftsman.
  #     Without it, the cross-repo checkout of Craftsman fails with "Repository not found".
  sync:
    if: github.event.ref_type == 'branch'
    uses: TenonHQ/Craftsman/.github/workflows/branch-clickup-sync.yml@main
    with:
      branch_name: ${{ github.event.ref }}
      repo_full_name: ${{ github.repository }}
    secrets:
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}
      CONFIG_REPO_TOKEN: ${{ secrets.AUTOMATION_CONFIG_TOKEN }}
